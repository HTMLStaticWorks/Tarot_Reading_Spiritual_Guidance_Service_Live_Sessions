<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Aura</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d4a574'%3E%3Cpath d='M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.6-.1 1.2.3 1.3.9.1.6-.3 1.2-.9 1.3-3.5.7-6 3.8-6 7.6 0 4.4 3.6 8 8 8 3.8 0 6.9-2.5 7.6-6 .1-.6.7-1 1.3-.9.6.1 1 .7.9 1.3-.9 4.7-5 8.2-9.8 8.2-.5 0-.5 0-.5 0z'/%3E%3C/svg%3E">
  <meta name="description" content="Access your Celestial Tarot dashboard, track readings, and join scheduled live spiritual sessions.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { midnight: '#0a0e27', cosmic: '#2d1b69', indigo: '#4c1d95', emerald: '#10b981', gold: '#d4a574', 'gold-light': '#f0c987', moonlight: '#c0c0d0', lavender: '#a78bfa' }, fontFamily: { heading: ['Cinzel','serif'], body: ['Inter','sans-serif'], decorative: ['Cinzel Decorative','serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="page-transition">
  <div id="scroll-progress"></div>

  <main class="auth-page">
    <div id="particles-container" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;"></div>

    <div class="auth-card relative z-10" id="login-container">
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-bold mb-3" style="font-family: var(--font-heading-decorative); color: var(--mystic-gold); text-decoration: none;">
          <i class="fas fa-moon"></i><span>Celestial Tarot</span>
        </a>
        <h2 class="text-xl font-bold" style="font-family: var(--font-heading); color: var(--white);">Welcome Back Seeker</h2>
        <p class="text-sm" style="color: var(--moonlight);">Sign in to access your portal</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="" required>
          <div class="form-error"></div>
        </div>

        <div class="form-group relative">
          <label for="login-password" class="form-label">Password</label>
          <div class="relative">
            <input type="password" id="login-password" class="form-input pr-10" placeholder="" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="form-error"></div>
        </div>

        <div class="flex items-center justify-between mb-6 text-sm">
          <label class="flex items-center gap-2 cursor-pointer" style="color: var(--moonlight);">
            <input type="checkbox" id="remember-me" class="rounded bg-black/20 border-white/10 text-lavender focus:ring-lavender" aria-label="Remember me">
            <span>Remember Me</span>
          </label>
          <a href="#" class="hover:text-gold-light" style="color: var(--lavender); text-decoration: none;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary w-full py-3">
          <i class="fas fa-sign-in-alt"></i> Access Dashboard
        </button>

        <div class="auth-divider">Or continue with</div>

        <div class="grid grid-cols-2 gap-4">
          <button type="button" class="google-btn">
            <i class="fab fa-google text-red-500"></i> Google
          </button>
          <button type="button" class="google-btn">
            <i class="fab fa-apple text-white"></i> Apple
          </button>
        </div>
      </form>

      <p class="text-center mt-6 text-sm" style="color: var(--moonlight);">
        Don't have an account? 
        <a href="signup.html" class="font-bold hover:text-gold-light" style="color: var(--lavender); text-decoration: none;">Create Account</a>
      </p>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/forms.js"></script>
</body>
</html>
