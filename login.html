<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Aura</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Ccircle cx='50' cy='50' r='42' stroke='%23d4a574' stroke-width='2'/%3E%3Cpath d='M60 25C42 25 30 38 30 54C30 70 42 83 60 83C45 83 36 71 36 54C36 37 45 25 60 25Z' fill='%23d4a574'/%3E%3Cpath d='M48 50C48 40 45 42 50 32C55 42 52 40 52 50C52 60 55 58 50 68C45 58 48 60 48 50Z' fill='%23d4a574'/%3E%3Cpath d='M50 48C40 48 42 45 32 50C42 55 40 52 50 52C60 52 58 55 68 50C58 45 60 48 50 48Z' fill='%23d4a574'/%3E%3C/svg%3E">
  <meta name="description" content="Access your Aura dashboard, track readings, and join scheduled live spiritual sessions.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { midnight: '#0a0e27', cosmic: '#2d1b69', indigo: '#4c1d95', emerald: '#10b981', gold: '#d4a574', 'gold-light': '#f0c987', moonlight: '#c0c0d0', lavender: '#a78bfa' }, fontFamily: { heading: ['Cinzel','serif'], body: ['Inter','sans-serif'], decorative: ['Cinzel Decorative','serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="page-transition">
  <div id="scroll-progress"></div>

  <main class="auth-page" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div id="particles-container" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;"></div>

    <!-- Top Controls Bar -->
    <div class="relative z-20 flex items-center justify-end gap-3 w-full" style="max-width:440px; padding: 0 0 0.75rem 0;">
      <button class="theme-toggle" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
      <button class="rtl-toggle" aria-label="Toggle RTL"><i class="fas fa-right-left"></i></button>
    </div>

    <div class="auth-card relative z-10" id="login-container">
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2.5 text-2xl font-bold mb-3" style="font-family: var(--font-heading-decorative); color: var(--mystic-gold); text-decoration: none;">
          <svg class="w-8 h-8" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" stroke="url(#logo-gold-gradient-card)" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
            <circle cx="50" cy="50" r="42" stroke="url(#logo-gold-gradient-card)" stroke-width="1"/>
            <path d="M50 4L52 14L50 16L48 14Z" fill="url(#logo-gold-gradient-card)" opacity="0.8"/>
            <path d="M50 96L52 86L50 84L48 86Z" fill="url(#logo-gold-gradient-card)" opacity="0.8"/>
            <path d="M4 50L14 52L16 50L14 48Z" fill="url(#logo-gold-gradient-card)" opacity="0.8"/>
            <path d="M96 50L86 52L84 50L86 48Z" fill="url(#logo-gold-gradient-card)" opacity="0.8"/>
            <path d="M60 25C42 25 30 38 30 54C30 70 42 83 60 83C45 83 36 71 36 54C36 37 45 25 60 25Z" fill="url(#logo-gold-gradient-card)"/>
            <path d="M48 50C48 40 45 42 50 32C55 42 52 40 52 50C52 60 55 58 50 68C45 58 48 60 48 50Z" fill="url(#logo-gold-gradient-card)"/>
            <path d="M50 48C40 48 42 45 32 50C42 55 40 52 50 52C60 52 58 55 68 50C58 45 60 48 50 48Z" fill="url(#logo-gold-gradient-card)"/>
            <circle cx="50" cy="50" r="3" fill="#ffffff"/>
            <circle cx="70" cy="40" r="1.5" fill="url(#logo-gold-gradient-card)" opacity="0.8"/>
            <circle cx="32" cy="30" r="1" fill="url(#logo-gold-gradient-card)" opacity="0.6"/>
            <circle cx="34" cy="72" r="1.5" fill="url(#logo-gold-gradient-card)" opacity="0.8"/>
            <circle cx="68" cy="68" r="1" fill="url(#logo-gold-gradient-card)" opacity="0.6"/>
            <defs>
              <linearGradient id="logo-gold-gradient-card" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#f0c987"/>
                <stop offset="50%" stop-color="#d4a574"/>
                <stop offset="100%" stop-color="#a87f51"/>
              </linearGradient>
            </defs>
          </svg>
          <span>Aura</span>
        </a>
        <h2 class="text-xl font-bold" style="font-family: var(--font-heading); color: var(--white);">Welcome Back Seeker</h2>
        <p class="text-sm" style="color: var(--moonlight);">Sign in to access your portal</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="" required>
          <div class="form-error"></div>
        </div>

        <div class="form-group relative">
          <label for="login-password" class="form-label">Password</label>
          <div class="relative">
            <input type="password" id="login-password" class="form-input pr-10" placeholder="" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="form-error"></div>
        </div>

        <div class="flex items-center justify-between mb-6 text-sm">
          <label class="flex items-center gap-2 cursor-pointer" style="color: var(--moonlight);">
            <input type="checkbox" id="remember-me" class="rounded bg-black/20 border-white/10 text-lavender focus:ring-lavender" aria-label="Remember me">
            <span>Remember Me</span>
          </label>
          <a href="#" class="hover:text-gold-light" style="color: var(--lavender); text-decoration: none;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary w-full py-3">
          <i class="fas fa-sign-in-alt"></i> Access Dashboard
        </button>

        <div class="auth-divider">Or continue with</div>

        <div class="grid grid-cols-2 gap-4">
          <button type="button" class="google-btn">
            <i class="fab fa-google text-red-500"></i> Google
          </button>
          <button type="button" class="google-btn">
            <i class="fab fa-apple text-white"></i> Apple
          </button>
        </div>
      </form>

      <p class="text-center mt-6 text-sm" style="color: var(--moonlight);">
        Don't have an account? 
        <a href="signup.html" class="font-bold hover:text-gold-light" style="color: var(--lavender); text-decoration: none;">Create Account</a>
      </p>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/forms.js"></script>
</body>
</html>
