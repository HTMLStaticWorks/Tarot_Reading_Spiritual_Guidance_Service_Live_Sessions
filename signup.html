<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Celestial Tarot</title>
  <meta name="description" content="Register an account on Celestial Tarot to schedule expert live sessions, track readings, and get custom horoscopes.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { midnight: '#0a0e27', cosmic: '#2d1b69', indigo: '#4c1d95', emerald: '#10b981', gold: '#d4a574', 'gold-light': '#f0c987', moonlight: '#c0c0d0', lavender: '#a78bfa' }, fontFamily: { heading: ['Cinzel','serif'], body: ['Inter','sans-serif'], decorative: ['Cinzel Decorative','serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="page-transition">
  <div id="scroll-progress"></div>

  <main class="auth-page">
    <div id="particles-container" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;"></div>

    <div class="auth-card relative z-10" id="signup-container">
      <div class="text-center mb-6">
        <a href="index.html" class="inline-flex items-center gap-2 text-2xl font-bold mb-2" style="font-family: var(--font-heading-decorative); color: var(--mystic-gold); text-decoration: none;">
          <i class="fas fa-moon"></i><span>Celestial Tarot</span>
        </a>
        <h2 class="text-xl font-bold" style="font-family: var(--font-heading); color: var(--white);">Join the Circle</h2>
        <p class="text-xs" style="color: var(--moonlight);">Embark on your journey of self-discovery</p>
      </div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="signup-name" class="form-label">Full Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="" required>
          <div class="form-error"></div>
        </div>

        <div class="form-group">
          <label for="signup-email" class="form-label">Email Address</label>
          <input type="email" id="signup-email" class="form-input" placeholder="" required>
          <div class="form-error"></div>
        </div>

        <div class="form-group">
          <label for="signup-phone" class="form-label">Phone Number</label>
          <input type="tel" id="signup-phone" class="form-input" placeholder="" required>
          <div class="form-error"></div>
        </div>

        <div class="form-group relative">
          <label for="signup-password" class="form-label">Password</label>
          <div class="relative">
            <input type="password" id="signup-password" class="form-input pr-10" placeholder="" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="form-error"></div>
        </div>

        <div class="form-group relative">
          <label for="signup-confirm" class="form-label">Confirm Password</label>
          <div class="relative">
            <input type="password" id="signup-confirm" class="form-input pr-10" placeholder="" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="form-error"></div>
        </div>

        <div class="form-group mb-6">
          <label class="flex items-start gap-2 cursor-pointer text-xs" style="color: var(--moonlight);">
            <input type="checkbox" id="signup-terms" class="mt-0.5 rounded bg-black/20 border-white/10 text-lavender focus:ring-lavender" aria-label="Agree to terms">
            <span>I agree to the <a href="#" style="color: var(--lavender); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--lavender); text-decoration: none;">Privacy Policy</a></span>
          </label>
          <div class="form-error" id="terms-error"></div>
        </div>

        <button type="submit" class="btn-primary w-full py-3">
          <i class="fas fa-user-plus"></i> Create Account
        </button>

        <div class="auth-divider">Or sign up with</div>

        <div class="grid grid-cols-2 gap-4">
          <button type="button" class="google-btn">
            <i class="fab fa-google text-red-500"></i> Google
          </button>
          <button type="button" class="google-btn">
            <i class="fab fa-apple text-white"></i> Apple
          </button>
        </div>
      </form>

      <p class="text-center mt-6 text-sm" style="color: var(--moonlight);">
        Already have an account? 
        <a href="login.html" class="font-bold hover:text-gold-light" style="color: var(--lavender); text-decoration: none;">Sign In</a>
      </p>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/forms.js"></script>
</body>
</html>
